image: alpine:latest

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp -r *.html public/ 2>/dev/null || true
    - cp -r *.css public/ 2>/dev/null || true
    - cp -r *.js public/ 2>/dev/null || true
    - cp -r assets public/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  only:
    - main
